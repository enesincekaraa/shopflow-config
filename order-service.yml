spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/orderdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  cloud:
    openfeign:
      okhttp:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

server:
  port: 8083

services:
  product-service:
    url: http://${PRODUCT_SERVICE_HOST:localhost}:8081
  customer-service:
    url: http://${CUSTOMER_SERVICE_HOST:localhost}:8082

info:
  app:
    name: Order Service
    version: 1.0.0